services:
  # Laravel PHP FPM service
  laravel:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: resumefit-laravel
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./src:/var/www/html
    networks:
      - resumefit-network
    depends_on:
      - postgres
      - redis
    env_file: .env

  nginx:
    image: nginx:alpine
    container_name: resumefit-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - resumefit-network
    depends_on:
      - laravel

  postgres:
    image: postgres:15-alpine
    container_name: resumefit-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-resumefit}
      POSTGRES_USER: ${DB_USERNAME:-resumefit_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-resumefit_password}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-resumefit_user} -d ${DB_DATABASE:-resumefit}"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - resumefit-postgres-data:/var/lib/postgresql/data
    networks:
      - resumefit-network

  redis:
    image: redis:alpine
    container_name: resumefit-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - resumefit-redis-data:/data
    networks:
      - resumefit-network

  ai-service:
    build:
      context: ./ai-service
    container_name: resumefit-ai
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes: # Mount the entire ai-service directory to /app
      - ./ai-service:/app 
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-1.5-flash}
    networks:
      - resumefit-network

networks:
  resumefit-network:
    driver: bridge

volumes:
  resumefit-postgres-data:
  resumefit-redis-data: